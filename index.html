<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港基層家庭理財模擬器</title>
    <!-- 網頁分頁圖示 (Favicon) - 使用 SVG 與 Emoji 動態生成 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪙</text></svg>">
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 引入 Babel 以在瀏覽器中編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 隱藏捲軸以美化介面 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .animate-bounce-custom { animation: bounce-custom 0.3s ease-in-out; }
        @keyframes bounce-custom {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .slide-in { animation: slide-in 0.4s ease-out forwards; }
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SVG 圖示組件 ---
        const IconHome = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconUtensils = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>;
        const IconArrowRight = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
        const IconBookOpen = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const IconStethoscope = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></svg>;
        const IconAlertCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
        const IconCheckCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
        const IconShirt = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.38 3.46 16 2a8 8 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>;
        const IconActivity = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
        const IconStar = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
        const IconUsers = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconHeartCrack = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="m12 13-1-1 2-2-3-3 2-2"/></svg>;
        const IconCoin = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg>;

        const PovertySim = () => {
            const INCOME = 11850;
            
            const [choices, setChoices] = useState({
                housing: 0,
                food: 0,
                transport: 0,
                education: 0,
                medical: 0,
                utilities: 0,
                clothes: 0
            });

            const [showResult, setShowResult] = useState(false);
            const [animationClass, setAnimationClass] = useState('');
            // 新增狀態：追蹤當前顯示的類別索引 (分頁模式)
            const [currentStep, setCurrentStep] = useState(0);
            
            const categories = [
                {
                    id: 'housing',
                    title: '居住環境 (Housing)',
                    icon: <IconHome className="w-6 h-6 text-blue-500" />,
                    options: [
                        { price: 7500, label: '舊樓兩房單位', desc: '雖然舊但有獨立房窗，位於市區。', quality: '尚可', impact: '', image: 'https://i.postimg.cc/cHX4hM2G/1.jpg' },
                        { price: 4800, label: '深水埗劏房', desc: '120呎，廚廁合一。', quality: '惡劣', impact: '空間極度擠迫，油煙味重，兄妹無處轉身，容易因爭奪空間而吵架。', concept: '#空間貧窮', affects: { quality: 1, relationship: 1, health: 0.5 }, image: 'https://i.postimg.cc/HxBsz4Kf/2.jpg' },
                        { price: 3500, label: '偏遠村屋/唐樓', desc: '新界偏遠地區或高層無升降機唐樓。', quality: '極差', impact: '雖然租金較低，但交通費高昂且通勤極長（時間貧窮）。若住高層唐樓，每日上落樓梯體力透支，且舊樓衛生環境較差，蚊蟲鼠患頻生。', concept: '#居住不公', affects: { quality: 1.2, relationship: 1, health: 1 }, image: 'https://i.postimg.cc/wv0T2cPn/3.jpg' }
                    ]
                },
                {
                    id: 'food',
                    title: '膳食開支 (Food)',
                    icon: <IconUtensils className="w-6 h-6 text-orange-500" />,
                    options: [
                        { price: 4500, label: '街市買餸煮飯', desc: '堅持每日新鮮食材，三餸一湯。', quality: '健康', impact: '', image: 'https://i.postimg.cc/B6MQpcyV/4.jpg' },
                        { price: 3000, label: '急凍與特價品', desc: '專攻超市特價與急凍肉自行煮食。', quality: '普通', impact: '營養攝取不均，長期食用急凍肉類，缺乏新鮮蔬果，孩子體質較弱。', concept: '#隱性飢餓', affects: { quality: 0.5, relationship: 0, health: 0.5 }, image: 'https://i.postimg.cc/gjjcTLFT/5.jpg' },
                        { price: 3500, label: '廉價兩餸飯/快餐', desc: '因工作疲勞無暇煮食，全家吃平價外賣。', quality: '極差', impact: '雖然節省了時間，但長期攝取高油、高鹽、高糖食物（三高），缺乏膳食纖維，增加患長期病風險，且失去家庭飯桌的交流時光。', concept: '#食物不安全', affects: { quality: 0.8, relationship: 0.8, health: 1.2 }, image: 'https://i.postimg.cc/7hhPWJ8c/6.jpg' }
                    ]
                },
                {
                    id: 'transport',
                    title: '交通出行 (Transport)',
                    icon: <IconArrowRight className="w-6 h-6 text-gray-500" />,
                    options: [
                        { price: 1200, label: '港鐵與巴士', desc: '正常通勤，確保睡眠時間。', quality: '正常', impact: '', image: 'https://i.postimg.cc/6qq6m4Jg/7.jpg' },
                        { price: 100, label: '步行或踩單車', desc: '極限節省，無論多遠都盡量不搭車。', quality: '疲勞', impact: '日曬雨淋，極度消耗體力。在繁忙馬路邊行走或踏單車吸入廢氣，亦有交通安全風險。回家後累得無法與家人互動。', concept: '#時間貧窮', affects: { quality: 0.8, relationship: 1.2, health: 1 }, image: 'https://i.postimg.cc/rssyPR26/8.jpg' }
                    ]
                },
                {
                    id: 'education',
                    title: '子女教育 (Education)',
                    icon: <IconBookOpen className="w-6 h-6 text-green-600" />,
                    options: [
                        { price: 2500, label: '補習與興趣班', desc: '專科補習 + 一項興趣（如畫畫）。', quality: '良好', impact: '', image: 'https://i.postimg.cc/6qq6m4xW/9.jpg' },
                        { price: 1500, label: '只補主科', desc: '只補英文/數學，放棄興趣班。', quality: '基本', impact: '保住了學業基本盤，但生活只剩下讀書與考試。缺乏才藝發展，孩子在學校話題減少，生活單調乏味。', concept: '#發展權利剝奪', affects: { quality: 0.5, relationship: 0.5, health: 0.2 }, image: 'https://i.postimg.cc/mkkZ51W2/10.jpg' },
                        { price: 500, label: '基本書簿雜費', desc: '完全不補習，依賴學校資源。', quality: '犧牲', impact: '父母無力指導功課，成績容易落後。因欠缺額外資源，產生嚴重學習焦慮與自卑感，陷入跨代貧窮循環。', concept: '#跨代貧窮', affects: { quality: 1, relationship: 0.8, health: 0.5 }, image: 'https://i.postimg.cc/NFFGz2vj/11.jpg' }
                    ]
                },
                {
                    id: 'medical',
                    title: '醫療健康 (Medical)',
                    icon: <IconStethoscope className="w-6 h-6 text-red-500" />,
                    options: [
                        { price: 800, label: '私家診所', desc: '生病即看醫生，快速康復。', quality: '安心', impact: '', image: 'https://i.postimg.cc/3NNrc0Qy/12.jpg' },
                        { price: 200, label: '公立門診', desc: '清晨排籌或輪候急症。', quality: '風險', impact: '需花費大量時間輪候，往往小病拖成大病。生病期間無法休息仍需照顧家庭，身心俱疲。', concept: '#醫療可達性', affects: { quality: 0.5, relationship: 0.5, health: 0.8 }, image: 'https://i.postimg.cc/Y0P2K2tC/13.jpg' },
                        { price: 50, label: '成藥/忍痛', desc: '自行買藥或忍耐，不看醫生。', quality: '危險', impact: '缺乏專業診斷，存在誤診風險（如胃痛當消化不良）。長期痛症（如牙痛）導致脾氣暴躁，嚴重影響家庭和諧。', concept: '#健康不平等', affects: { quality: 1, relationship: 1.2, health: 1.5 }, image: 'https://i.postimg.cc/prSVbVPd/14.jpg' }
                    ]
                },
                {
                    id: 'utilities',
                    title: '水電煤網 (Utilities)',
                    icon: <IconAlertCircle className="w-6 h-6 text-yellow-500" />,
                    options: [
                        { price: 1000, label: '舒適使用', desc: '夏天開冷氣、穩定寬頻。', quality: '舒適', impact: '', image: 'https://i.postimg.cc/x8ZjDj98/15.jpg' },
                        { price: 700, label: '審慎使用', desc: '限時開冷氣，時刻留意電錶。', quality: '緊張', impact: '為了省電，即使熱也只開風扇，只有睡覺前才敢開一會冷氣。全家人精神緊張，時常為「誰忘了關燈」而爭吵。', concept: '#能源焦慮', affects: { quality: 0.5, relationship: 0.5, health: 0.2 }, image: 'https://i.postimg.cc/mknZfZTc/16.jpg' },
                        { price: 400, label: '極限慳電/斷網', desc: '不開冷氣，取消家居寬頻。', quality: '艱苦', impact: '酷熱難眠影響精神及日間工作表現；數碼鴻溝導致孩子無法在家完成網上作業，學習進度落後。', concept: '#數碼鴻溝', affects: { quality: 1.2, relationship: 0.8, health: 1 }, image: 'https://i.postimg.cc/1XdRhRy0/17.jpg' }
                    ]
                },
                {
                    id: 'clothes',
                    title: '衣物鞋履 (Clothing)',
                    icon: <IconShirt className="w-6 h-6 text-purple-500" />,
                    options: [
                        { 
                            price: 500, 
                            label: '基本添置與替換', 
                            desc: '應付換季需求，大人有得體的上班服，小孩有合身的校服。', 
                            quality: '體面', 
                            impact: '', 
                            image: 'https://i.postimg.cc/1XdRhRyr/18.jpg' 
                        },
                        { 
                            price: 200, 
                            label: '特價/平價網購', 
                            desc: '專攻特賣場或平價網購，質料較差但求蔽體。', 
                            quality: '普通', 
                            impact: '衣物容易起毛球或褪色；大人穿著磨損的鞋子上班，可能影響求職或工作形象；孩子則因穿著廉價服飾在同儕間感到自卑。', 
                            concept: '#物質匱乏', 
                            affects: { quality: 0.5, relationship: 0.2, health: 0.1 }, 
                            image: 'https://i.postimg.cc/HnNWDWTz/19.jpg' 
                        },
                        { 
                            price: 0, 
                            label: '舊衣縫補', 
                            desc: '幾乎不買新衣，撿拾二手衣物，鞋底磨平仍繼續穿。', 
                            quality: '犧牲', 
                            impact: '寒冬缺乏保暖厚衣，容易生病。大人穿著破舊衣履導致社交退縮、迴避親友聚會；孩子因衣不稱身遭受排擠，全家陷入嚴重的社會排斥與孤立。', 
                            concept: '#社會排斥', 
                            affects: { quality: 1, relationship: 0.8, health: 0.5 }, 
                            image: 'https://i.postimg.cc/d0Vp1wc9/A-claustrophobic-80-sq-ft-subdivided-flat-in-Hong-Kong-extremely-cramped-space-no-windows-peeling.jpg' 
                        }
                    ]
                }
            ];

            const totalExpenses = Object.keys(choices).reduce((acc, key) => {
                const category = categories.find(c => c.id === key);
                return acc + category.options[choices[key]].price;
            }, 0);

            const balance = INCOME - totalExpenses;
            const isDeficit = balance < 0;

            const handleSelect = (categoryId, optionIndex) => {
                setChoices(prev => ({ ...prev, [categoryId]: optionIndex }));
                setAnimationClass('animate-bounce-custom');
                setTimeout(() => setAnimationClass(''), 300);
            };

            // 【修復】將防越界邏輯放入狀態更新內部，徹底防止快速連點導致的白畫面崩潰
            const handleNextStep = () => {
                setCurrentStep(prev => (prev < categories.length - 1 ? prev + 1 : prev));
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handlePrevStep = () => {
                setCurrentStep(prev => (prev > 0 ? prev - 1 : prev));
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const calculateScores = () => {
                let scores = { quality: 100, relationship: 100, health: 100 };
                const MULTIPLIER = 15;
                
                Object.keys(choices).forEach(key => {
                    const category = categories.find(c => c.id === key);
                    const selectedOptionIndex = choices[key];
                    
                    if (selectedOptionIndex > 0 && category.options[selectedOptionIndex].affects) {
                        const affects = category.options[selectedOptionIndex].affects;
                        if (affects.quality) scores.quality -= (affects.quality * MULTIPLIER);
                        if (affects.relationship) scores.relationship -= (affects.relationship * MULTIPLIER);
                        if (affects.health) scores.health -= (affects.health * MULTIPLIER);
                    }
                });

                return {
                    quality: Math.max(0, scores.quality),
                    relationship: Math.max(0, scores.relationship),
                    health: Math.max(0, scores.health)
                };
            };

            const scores = calculateScores();

            // 為了適應深淺色背景，統一使用高彩度顏色
            const getScoreColor = (score) => {
                if (score >= 80) return 'text-green-400';
                if (score >= 50) return 'text-amber-400';
                return 'text-red-400';
            };

            const getBarColor = (score) => {
                if (score >= 80) return 'bg-green-500';
                if (score >= 50) return 'bg-amber-500';
                return 'bg-red-500';
            };

            const activeImpacts = categories
                .filter(cat => choices[cat.id] > 0 && cat.options[choices[cat.id]].impact)
                .map(cat => ({
                    title: cat.title, 
                    text: cat.options[choices[cat.id]].impact,
                    icon: cat.icon,
                    concept: cat.options[choices[cat.id]].concept,
                    affects: cat.options[choices[cat.id]].affects
                }));

            // 【安全防護】取得目前分頁的類別，加入備用方案 (||) 確保即使出錯也永遠有資料可以渲染
            const currentCat = categories[currentStep] || categories[categories.length - 1];

            return (
                /* 單欄瀑布流佈局：移除 lg:flex-row 與 lg:overflow-hidden，讓內容自然向下延伸 */
                <div className="min-h-screen bg-gray-100 font-sans text-gray-800 flex flex-col relative">
                    
                    {/* COMPACT HEADER - 針對手機版大幅縮小內邊距與間距 */}
                    <header className="bg-slate-800 text-white p-2.5 md:p-4 sticky top-0 z-40 shadow-lg border-b-4 border-slate-600">
                        <div className="max-w-5xl mx-auto w-full space-y-2 md:space-y-3">
                            
                            {/* Top Row: Title & Income */}
                            <div className="flex justify-between items-center border-b border-slate-700 pb-1.5 md:pb-2">
                                <div className="flex items-baseline gap-2">
                                    <h1 className="text-base md:text-lg font-bold tracking-wide">貧窮模擬器</h1>
                                    <span className="text-[10px] md:text-xs text-slate-400 hidden sm:inline">目標：生存</span>
                                </div>
                                <div className="flex items-center gap-1.5 md:gap-2 bg-slate-700/50 px-2 py-1 md:px-3 md:py-1.5 rounded border border-slate-600">
                                    <span className="text-[9px] md:text-[10px] text-slate-300 uppercase flex items-center gap-1">
                                        <IconCoin className="w-3 h-3 md:w-3.5 md:h-3.5 text-yellow-400" />
                                        <span className="hidden xs:inline">固定月入</span>
                                        <span className="xs:hidden">月入</span>
                                    </span>
                                    <span className="font-bold text-sm md:text-base text-white">${INCOME.toLocaleString()}</span>
                                </div>
                            </div>

                            {/* Dashboard Row: Financials (Left) & Status Scores (Right) */}
                            <div className="flex flex-col md:flex-row gap-2 md:gap-4">
                                
                                {/* 左側區塊：財務預算條 */}
                                <div className="flex-1 flex flex-col gap-1.5 md:gap-2">
                                    <div className="bg-slate-900/40 rounded-lg p-2 md:p-3 border border-slate-700">
                                        <div className="flex justify-between items-center mb-1.5 md:mb-2">
                                            <div className="flex flex-col">
                                                <span className="text-[9px] md:text-[11px] text-slate-400 uppercase tracking-wider mb-0.5 md:mb-1">預計結餘</span>
                                                <span className={`text-xl md:text-3xl font-bold leading-none ${isDeficit ? 'text-red-400' : 'text-green-400'} ${animationClass} transition-all duration-300`}>
                                                    {balance > 0 ? '+' : ''}{balance.toLocaleString()}
                                                </span>
                                            </div>
                                            <div className="flex flex-col items-end">
                                                <span className="text-[9px] md:text-[11px] text-slate-400 uppercase tracking-wider mb-0.5 md:mb-1">總支出</span>
                                                <span className="text-lg md:text-2xl font-bold text-white leading-none">${totalExpenses.toLocaleString()}</span>
                                            </div>
                                        </div>

                                        {/* Progress Bar */}
                                        <div className="relative h-1.5 md:h-2 w-full bg-slate-700 rounded-full overflow-hidden">
                                            <div style={{ width: `${Math.min((totalExpenses / INCOME) * 100, 100)}%` }} className={`h-full transition-all duration-500 ${isDeficit ? 'bg-red-500' : 'bg-green-500'}`}></div>
                                        </div>
                                    </div>
                                    
                                    {/* Warning Message */}
                                    {isDeficit ? (
                                        <div className="bg-red-500/10 border border-red-500/50 text-red-200 px-2 py-1 md:px-3 md:py-2 rounded text-[10px] md:text-xs font-bold flex items-center justify-center gap-1.5 md:gap-2">
                                            <IconAlertCircle className="w-3.5 h-3.5 md:w-4 md:h-4 text-red-400 shrink-0" />
                                            <span>警告：入不敷出！請在下方選擇較便宜的選項。</span>
                                        </div>
                                    ) : (
                                        <div className="bg-green-500/10 border border-green-500/50 text-green-200 px-2 py-1 md:px-3 md:py-2 rounded text-[10px] md:text-xs font-bold flex items-center justify-center gap-1.5 md:gap-2">
                                            <IconCheckCircle className="w-3.5 h-3.5 md:w-4 md:h-4 text-green-400 shrink-0" />
                                            <span>收支平衡。留意右側生活指數。</span>
                                        </div>
                                    )}
                                </div>

                                {/* 右側區塊：目前生活狀況指數 (手機版改為橫向並排以節省高度) */}
                                <div className="flex-1 bg-slate-900/40 rounded-lg p-2 md:p-3 border border-slate-700 flex flex-col justify-center">
                                    <div className="flex justify-between items-center mb-1.5 md:mb-2">
                                        <h2 className="text-[10px] md:text-xs font-bold text-slate-300 flex items-center gap-1 md:gap-1.5 uppercase tracking-wider">
                                            <IconActivity className="w-3 h-3 md:w-4 md:h-4" />
                                            <span className="hidden xs:inline">目前生活狀況指數</span>
                                            <span className="xs:hidden">生活狀況</span>
                                        </h2>
                                        <span className="text-[8px] md:text-[9px] text-slate-500">滿分 100</span>
                                    </div>
                                    
                                    <div className="grid grid-cols-3 gap-2 md:grid-cols-1 md:space-y-2.5">
                                        {/* Quality Index */}
                                        <div className="flex flex-col md:block">
                                            {/* 手機版改為上下堆疊 (flex-col)，桌面版左右分佈 (md:flex-row) */}
                                            <div className="flex flex-col md:flex-row items-center justify-between mb-1 gap-0.5 md:gap-0">
                                                <span className="text-[10px] md:text-xs font-bold text-slate-400 flex items-center gap-1">
                                                    <IconStar className="w-3 h-3 md:w-3.5 md:h-3.5 text-amber-500" /> 
                                                    <span>生活品質</span>
                                                </span>
                                                <span className={`text-[11px] md:text-xs font-bold ${getScoreColor(scores.quality)}`}>{scores.quality.toFixed(0)}</span>
                                            </div>
                                            <div className="h-1 md:h-1.5 bg-slate-700 rounded-full overflow-hidden w-full">
                                                <div className={`h-full transition-all duration-500 ${getBarColor(scores.quality)}`} style={{ width: `${scores.quality}%` }}></div>
                                            </div>
                                        </div>

                                        {/* Relationship Index */}
                                        <div className="flex flex-col md:block">
                                            <div className="flex flex-col md:flex-row items-center justify-between mb-1 gap-0.5 md:gap-0">
                                                <span className="text-[10px] md:text-xs font-bold text-slate-400 flex items-center gap-1">
                                                    <IconUsers className="w-3 h-3 md:w-3.5 md:h-3.5 text-blue-400" /> 
                                                    <span>家庭關係</span>
                                                </span>
                                                <span className={`text-[11px] md:text-xs font-bold ${getScoreColor(scores.relationship)}`}>{scores.relationship.toFixed(0)}</span>
                                            </div>
                                            <div className="h-1 md:h-1.5 bg-slate-700 rounded-full overflow-hidden w-full">
                                                <div className={`h-full transition-all duration-500 ${getBarColor(scores.relationship)}`} style={{ width: `${scores.relationship}%` }}></div>
                                            </div>
                                        </div>

                                        {/* Health Index */}
                                        <div className="flex flex-col md:block">
                                            <div className="flex flex-col md:flex-row items-center justify-between mb-1 gap-0.5 md:gap-0">
                                                <span className="text-[10px] md:text-xs font-bold text-slate-400 flex items-center gap-1">
                                                    <IconHeartCrack className="w-3 h-3 md:w-3.5 md:h-3.5 text-red-500" /> 
                                                    <span>身心健康</span>
                                                </span>
                                                <span className={`text-[11px] md:text-xs font-bold ${getScoreColor(scores.health)}`}>{scores.health.toFixed(0)}</span>
                                            </div>
                                            <div className="h-1 md:h-1.5 bg-slate-700 rounded-full overflow-hidden w-full">
                                                <div className={`h-full transition-all duration-500 ${getBarColor(scores.health)}`} style={{ width: `${scores.health}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* MAIN CONTENT: 橫向延伸的選項區域 */}
                    <div className="flex-1 flex flex-col w-full">
                        <div className="p-3 md:p-4 space-y-4 pb-12 max-w-5xl mx-auto w-full mt-2 md:mt-4">
                            
                            {/* Step Progress Indicator */}
                            <div className="flex justify-between items-center text-xs md:text-sm font-bold text-slate-500 mb-1 md:mb-2 px-1">
                                <span>步驟 {currentStep + 1} / {categories.length}</span>
                            </div>

                            {/* Current Category Card */}
                            <div key={currentCat.id} className="bg-white rounded-xl shadow-md p-4 md:p-6 border border-gray-200 slide-in">
                                <div className="flex items-center gap-2 md:gap-3 mb-4 md:mb-6 pb-3 md:pb-4 border-b border-gray-100">
                                    {currentCat.icon}
                                    <h3 className="font-bold text-xl md:text-2xl text-gray-800">{currentCat.title}</h3>
                                </div>

                                {/* Options Grid: 3個選項時會自動切換為 3 欄並排 (sm:grid-cols-3) */}
                                <div className={`grid gap-3 md:gap-6 ${currentCat.options.length === 3 ? 'grid-cols-1 sm:grid-cols-3' : 'grid-cols-1 sm:grid-cols-2'}`}>
                                    {currentCat.options.map((option, index) => {
                                        const isSelected = choices[currentCat.id] === index;
                                        
                                        // 還原為 3 個選項的 Emoji 邏輯
                                        let qualityEmoji = '🙂';
                                        if (index === 1) qualityEmoji = '😐'; 
                                        if (index === 2) qualityEmoji = '😢'; 

                                        return (
                                            <button
                                                key={index}
                                                onClick={() => handleSelect(currentCat.id, index)}
                                                className={`w-full text-left p-3 md:p-4 rounded-xl border-2 transition-all duration-200 relative group flex flex-col h-full ${isSelected ? 'border-blue-500 bg-blue-50/50 shadow-md ring-2 md:ring-4 ring-blue-100' : 'border-gray-200 hover:border-blue-300 bg-white hover:shadow-sm'}`}
                                            >
                                                {/* 圖片高度自適應：手機 28，平板 36，電腦 48 */}
                                                {option.image && (
                                                    <div className="mb-3 md:mb-4 w-full bg-gray-50 rounded-lg overflow-hidden border border-gray-100">
                                                        <img src={option.image} alt={option.label} className="w-full h-28 sm:h-36 md:h-48 object-cover mx-auto hover:scale-105 transition-transform duration-500" />
                                                    </div>
                                                )}
                                                <div className="flex flex-col gap-1 md:gap-1.5 mb-2 md:mb-3">
                                                    <span className={`font-bold text-base md:text-lg ${isSelected ? 'text-blue-800' : 'text-gray-800'}`}>{option.label}</span>
                                                    <div className="flex items-baseline gap-2 flex-wrap">
                                                        <span className="font-mono font-extrabold text-slate-700 text-lg md:text-xl">${option.price.toLocaleString()}</span>
                                                        {currentCat.id === 'food' && (
                                                            <span className="text-[10px] md:text-xs text-slate-500 font-medium bg-slate-100 px-1.5 py-0.5 rounded">
                                                                (${Math.round(option.price / 30 / 3)}/人/日)
                                                            </span>
                                                        )}
                                                    </div>
                                                </div>
                                                <p className="text-xs md:text-sm text-gray-600 flex-grow mb-3 md:mb-4 leading-relaxed">{option.desc}</p>
                                                
                                                {/* Emoji Container */}
                                                <div className="mt-auto pt-2 md:pt-3 border-t border-gray-100 flex justify-between items-center">
                                                    <span className="text-2xl md:text-3xl leading-none transition-transform group-hover:scale-110" title={option.quality}>
                                                        {qualityEmoji}
                                                    </span>
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Navigation Buttons: 手機版垂直全寬，桌面版水平分佈 */}
                            <div className="flex flex-col-reverse sm:flex-row justify-between items-center mt-6 md:mt-8 pt-2 md:pt-4 gap-3 sm:gap-0">
                                <button
                                    onClick={handlePrevStep}
                                    disabled={currentStep === 0}
                                    className={`w-full sm:w-auto px-6 py-3 rounded-xl font-bold text-base md:text-lg transition-all ${currentStep === 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed opacity-50' : 'bg-slate-200 text-slate-700 hover:bg-slate-300 active:scale-95 shadow-sm'}`}
                                >
                                    上一項
                                </button>

                                {currentStep < categories.length - 1 ? (
                                    <button
                                        onClick={handleNextStep}
                                        className="w-full sm:w-auto justify-center px-8 py-3 rounded-xl font-bold text-base md:text-lg bg-blue-600 text-white hover:bg-blue-700 active:scale-95 transition-all shadow-md flex items-center gap-2"
                                    >
                                        下一項 <IconArrowRight className="w-4 h-4 md:w-5 md:h-5" />
                                    </button>
                                ) : (
                                    <button
                                        onClick={() => setShowResult(true)}
                                        disabled={isDeficit}
                                        className={`w-full sm:w-auto justify-center px-8 py-3 rounded-xl font-bold text-base md:text-lg transition-all shadow-md ${isDeficit ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-green-600 text-white hover:bg-green-700 active:scale-95 animate-bounce-custom flex items-center gap-2'}`}
                                    >
                                        {isDeficit ? '請先消除赤字' : '結算總覽'}
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Result Modal */}
                    {showResult && (
                        <div className="fixed inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl max-w-lg w-full p-8 overflow-y-auto max-h-[90vh] shadow-2xl">
                                <h2 className="text-3xl font-extrabold mb-2 text-center text-slate-800">體驗總結</h2>
                                <p className="text-slate-600 mb-8 text-center text-sm">您成功平衡了收支，但這是您家庭本月的生活狀態：</p>
                                
                                <div className="flex justify-around mb-8 text-center gap-3">
                                    <div className="flex-1 bg-amber-50 p-3 rounded-xl border border-amber-100">
                                        <div className={`text-3xl font-black ${getScoreColor(scores.quality).replace('400','500')}`}>{scores.quality.toFixed(0)}</div>
                                        <div className="text-xs text-amber-800 font-bold mt-1">生活品質</div>
                                    </div>
                                    <div className="flex-1 bg-blue-50 p-3 rounded-xl border border-blue-100">
                                        <div className={`text-3xl font-black ${getScoreColor(scores.relationship).replace('400','500')}`}>{scores.relationship.toFixed(0)}</div>
                                        <div className="text-xs text-blue-800 font-bold mt-1">家庭關係</div>
                                    </div>
                                    <div className="flex-1 bg-red-50 p-3 rounded-xl border border-red-100">
                                        <div className={`text-3xl font-black ${getScoreColor(scores.health).replace('400','500')}`}>{scores.health.toFixed(0)}</div>
                                        <div className="text-xs text-red-800 font-bold mt-1">身心健康</div>
                                    </div>
                                </div>
                                
                                <div className="space-y-4 mb-8 bg-slate-50 p-5 rounded-xl border border-slate-200">
                                    <h4 className="font-bold text-sm text-slate-700 border-b border-slate-200 pb-2 flex items-center gap-2">
                                        <IconActivity className="w-4 h-4" /> 生活代價分析
                                    </h4>
                                    {activeImpacts.length > 0 ? activeImpacts.map((impact, i) => (
                                        <div key={i} className="flex gap-3 text-sm text-slate-700 items-start">
                                            <span className="text-red-500 mt-1 min-w-[10px] text-[10px]">●</span>
                                            <span className="text-xs leading-relaxed">{impact.text}</span>
                                        </div>
                                    )) : (
                                        <p className="text-center text-green-600 font-bold text-sm py-4">不可思議！您維持了完美的生活狀態！</p>
                                    )}
                                </div>
                                <button onClick={() => { setShowResult(false); setCurrentStep(0); }} className="w-full bg-slate-800 text-white py-4 rounded-xl font-bold text-lg hover:bg-slate-700 active:scale-95 transition-transform">重新體驗</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PovertySim />);
    </script>
</body>
</html>
